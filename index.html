    <!-- Preconnects: cut ~300-500ms off LCP on Slow 4G by warming up the DNS+TLS+TCP
         handshake for origins the app hits within the first 100ms of boot.
         Supabase hosts the four initial queries (stations/prices/votes/reporters),
         CartoCDN serves the Leaflet basemap tiles (which is the LCP element),
         and fonts.gstatic.com serves the Outfit woff2 that blocks first paint. -->
    <link rel="preconnect" href="%VITE_SUPABASE_URL%" crossorigin />
    <!-- No crossorigin: Leaflet fetches tiles as plain <img>, not CORS-attributed
         <img crossorigin>. PSI flags crossorigin preconnects as "unused" if the
         actual requests don't match, so we deliberately omit it here. -->
    <!-- Only a+b preconnected: Leaflet rotates across a/b/c subdomains, but the
         initial viewport typically pulls from just two. PSI flagged the c.
         hint as unused + over the 4-hint budget; dropping it frees headroom. -->
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://b.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Outfit font loaded here (not via @import in index.css) so the request
         starts in parallel with the CSS download instead of chaining behind it.
         PSI showed a 3-deep HTML→CSS→googleapis→gstatic chain worth ~1,450ms. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
    />
  </head>
  <body>
    <script>
      // Force apex: Vercel's www→apex 308 breaks Safari's POST /api/parse-prices
      // (cross-origin redirect with Content-Type: application/json can't re-preflight).
      // Must run before any fetch — put it before main.tsx.
      if (location.hostname === 'www.kyts.ee') {
        location.replace('https://kyts.ee' + location.pathname + location.search + location.hash);
      }
    </script>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('kyts-map-style') || 'dark');</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
